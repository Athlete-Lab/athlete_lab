name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev-prototype" ]
  pull_request:
    branches: [ "main", "dev-prototype" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests

      # Só roda na branch main (Produção)
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "Realizando deploy para o ambiente de PRODUÇÃO..."

      # Só roda na branch dev-prototype (Desenvolvimento)
      - name: Notify Dev Team
        if: github.ref == 'refs/heads/dev-prototype'
        run: echo "Código integrado na branch de desenvolvimento."